name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Type-check
        run: npm run type-check

      # Same as npm run build, without a second tsc (build script runs type-check then this file).
      - name: Build (web2 + web3)
        run: node build.js
